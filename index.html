<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zehrela Store - BTC Payment</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  padding: 30px;
  border-radius: 15px;
  width: 350px;
  box-shadow: 0 0 30px rgba(0,0,0,0.6);
}

h1 {
  text-align: center;
}

input {
  width: 100%;
  padding: 12px;
  margin-top: 12px;
  border: none;
  border-radius: 8px;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 20px;
  background: #00e676;
  border: none;
  border-radius: 10px;
  font-weight: bold;
  cursor: pointer;
}

.status {
  margin-top: 15px;
  text-align: center;
  font-size: 14px;
  color: #ccc;
}
</style>
</head>

<body>

<div class="container">
  <h1>Zehrela Store</h1>

  <input type="email" id="email" placeholder="Enter your email">
  <input type="number" id="usd" placeholder="Enter amount in USD (e.g. 10)">

  <button onclick="payNow()">Pay with BTC cash app⚡ (Lightning)</button>

  <div class="status" id="status">Secure crypto payment</div>
</div>

<script>
async function payNow() {
  const email = document.getElementById("email").value;
  const amount = document.getElementById("usd").value;
  const statusBox = document.getElementById("status");

  if (!email || !amount) {
    alert("Please fill all fields");
    return;
  }

  statusBox.innerText = "Creating secure payment...";

  try {
    const response = await fetch("https://api.nowpayments.io/v1/invoice", {
      method: "POST",
      headers: {
        "x-api-key": "7CNWS9V-A224CAZ-J994XGV-YW4D472",
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        price_amount: amount,
        price_currency: "usd",
        pay_currency: "btc",
        order_id: "Zehrela-" + Date.now(),
        order_description: "Payment from " + email,
        success_url: "https://zehrelastore.org/success.html",
        cancel_url: "https://zehrelastore.org/cancel.html"
      })
    });

    const data = await response.json();

    if (data.invoice_url) {
      statusBox.innerText = "Redirecting to payment...";
      window.location.href = data.invoice_url;
    } else {
      statusBox.innerText = "Payment error!";
      console.log(data);
      alert("Error creating payment");
    }

  } catch (error) {
    statusBox.innerText = "Connection error!";
    console.log(error);
    alert("Something went wrong");
  }
}
</script>

</body>
</html>
