<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>One Dollar Shop</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0f172a;
  color: white;
}

header {
  padding: 20px;
  text-align: center;
  background: #020617;
  font-size: 24px;
  font-weight: bold;
  letter-spacing: 1px;
}

.hero {
  text-align: center;
  padding: 60px 20px;
}

.hero h1 {
  font-size: 40px;
  margin-bottom: 10px;
}

.hero p {
  color: #94a3b8;
}

.btn {
  margin-top: 20px;
  padding: 12px 25px;
  background: #22c55e;
  border: none;
  border-radius: 8px;
  color: black;
  font-weight: bold;
  cursor: pointer;
}

.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
  gap: 20px;
  padding: 40px;
}

.card {
  background: #020617;
  border-radius: 15px;
  padding: 20px;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
}

.card img {
  width: 100%;
  border-radius: 10px;
}

.card h3 {
  margin: 10px 0;
}

.price {
  color: #22c55e;
  font-weight: bold;
}

footer {
  text-align: center;
  padding: 20px;
  color: #64748b;
}
</style>
</head>

</section>

<footer>
© 2026 One Dollar Shop — All Rights Reserved
</footer>
